<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<style>
  {{ print_css }}
  body { margin: 0; background: #e9e9ef; padding: 12px; overflow-x: auto; }
  .preview-grid {
    display: flex; flex-wrap: wrap; gap: 12px;
    /* Centrera när panelerna får plats, men vänsterjustera (safe) när de är
       bredare än ytan så de inte klipps - då kan man skrolla i sidled i stället. */
    justify-content: safe center;
    align-items: flex-start;
  }
  .pcard { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,.25); }
  .pcap { font: 11px/1.4 system-ui, sans-serif; text-align: center; color: #555; margin: 2px 0 6px; }
  figure { margin: 0; }
</style>
</head>
<body class="{% if d.display and d.display.four_color %}fourcolor{% endif %}">
{% import "panels/_macros.html" as p %}
<div class="preview-grid">
  <figure><div class="pcard">{{ p.panel_cover(d, logo_src, panel_scales.cover) }}</div><figcaption class="pcap">Kort 1 - fram (omslag)</figcaption></figure>
  <figure><div class="pcard">{{ p.panel_opening(d, panel_scales.opening) }}</div><figcaption class="pcap">Kort 1 - bak (öppningsbud)</figcaption></figure>
  <figure><div class="pcard">{{ p.panel_defense(d, panel_scales.defense) }}</div><figcaption class="pcap">Kort 2 - fram (försvar/konventioner)</figcaption></figure>
  <figure><div class="pcard">{{ p.panel_leads(d, panel_scales.leads) }}</div><figcaption class="pcap">Kort 2 - bak (utspel/markeringar)</figcaption></figure>
</div>
</body>
</html>
